<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="icon" href="data:image/svg+xml,
    <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
      <text y=%22.9em%22 font-size=%2290%22>🛡️</text>
    </svg>">
  <title>Gateway - {{ XRAY_NAME }}</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: rgba(30, 41, 59, 0.6);
      --text-color: #f8fafc;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(
        circle at 50% 0%, #1e3a8a 0%, transparent 70%
      );
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    .card {
      background: var(--surface-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 0.75rem;
      padding: 0.25rem;
    }
    .tab {
      flex: 1;
      background: none;
      border: none;
      color: #94a3b8;
      padding: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0.5rem;
      transition: 0.2s;
    }
    .tab.active {
      background: var(--accent-color);
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .qr-container {
      background: white;
      padding: 1rem;
      border-radius: 1rem;
      margin: 0 auto 1.5rem;
      display: inline-block;
    }
    .qr-container svg {
      display: block;
      width: 250px;
      height: 250px;
    }
    pre {
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 0.75rem;
      text-align: left;
      overflow-x: auto;
      font-size: 0.85rem;
      color: #38bdf8;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: block;
      background: var(--accent-color);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: all 0.2s ease;
      font-size: 1rem;
    }
    .btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    .view { display: none; }
    .view.active { display: block; }
    /* Syntax highlighting */
    .key { color: #7ee787; }
    .string { color: #a5d6ff; }
    .number { color: #79c0ff; }
    .boolean, .null { color: #ff7b72; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gateway: {{ XRAY_NAME }}</h1>
    
    <div class="tabs">
      <button class="tab active" id="tab-qr" onclick="show('qr')">
        QR Code
      </button>
      <button class="tab" id="tab-json" onclick="show('json')">
        JSON
      </button>
    </div>

    <div id="view-qr" class="view active">
      <div class="qr-container">
        {{ XRAY_QR_SVG }}
      </div>
      <button class="btn" id="btn-qr" onclick="copyLink()">
        Copy Link
      </button>
    </div>

    <div id="view-json" class="view">
      <pre><code id="json-code">{{ XRAY_JSON }}</code></pre>
      <button class="btn" id="btn-json" onclick="copyJson()">
        Copy JSON
      </button>
    </div>
  </div>

  <script>
    const XRAY_LINK = "{{ XRAY_LINK }}";

    function show(type) {
      document.getElementById('view-qr').classList.remove('active');
      document.getElementById('view-json').classList.remove('active');
      document.getElementById('tab-qr').classList.remove('active');
      document.getElementById('tab-json').classList.remove('active');

      document.getElementById('view-' + type).classList.add('active');
      document.getElementById('tab-' + type).classList.add('active');
    }

    function doCopy(text, btnId) {
      navigator.clipboard.writeText(text).then(() => {
        let btn = document.getElementById(btnId);
        let orig = btn.innerText;
        btn.innerText = '✔ Copied';
        btn.style.background = '#10b981'; // Green color
        setTimeout(() => {
          btn.innerText = orig;
          btn.style.background = '';
        }, 2000);
      }).catch(err => {
        console.error('Copy failed', err);
      });
    }

    function copyLink() {
      doCopy(XRAY_LINK, 'btn-qr');
    }

    function copyJson() {
      let code = document.getElementById('json-code').innerText;
      doCopy(code, 'btn-json');
    }

    // JSON Syntax Highlighting
    document.addEventListener("DOMContentLoaded", () => {
      const codeEl = document.getElementById('json-code');
      let text = codeEl.innerText;
      // Basic HTML escaping
      text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // Syntax Regex logic (split for width <= 79)
      const str = /"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?/.source;
      const kw = /\b(true|false|null)\b/.source;
      const num = /-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?/.source;
      const regex = new RegExp(`(${str}|${kw}|${num})`, 'g');
      
      const html = text.replace(regex, function (m) {
        let cls = 'number';
        if (/^"/.test(m)) cls = /:$/.test(m) ? 'key' : 'string';
        else if (/true|false/.test(m)) cls = 'boolean';
        else if (/null/.test(m)) cls = 'null';
        return '<span class="' + cls + '">' + m + '</span>';
      });
      codeEl.innerHTML = html;
    });
  </script>
</body>
</html>
